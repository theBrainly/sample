name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            # Go to app directory
            cd /var/www/app || mkdir -p /var/www/app && cd /var/www/app

            # Clone if first time, else pull latest code
            if [ ! -d ".git" ]; then
              git clone https://github.com/theBrainly/sample.git .
            else
              git pull origin main
            fi

            # Install dependencies
            npm install

            # Restart app using PM2
            pm2 restart app || pm2 start server.js --name app
